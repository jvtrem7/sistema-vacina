{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="shortcut icon" type="image/png" href="{% static 'vacinas/easyvacc.png' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyVacc</title>
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="EasyVacc">
    <link rel="manifest" href="{% url 'manifest' %}">
    <link rel="apple-touch-icon" href="{% static 'vacinas/icon-192.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        body { background-color: #f4f7fe; font-family: 'Inter', sans-serif; }
        .content-card { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container py-5">
        {% block content %}
        {% endblock %}
    </div>
    {% if request.path == '/' or '/meus-agendamentos' in request.path %}
    {% include 'vacinas/portal_chatbot.html' %}
    {% endif %}
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('{% url "service_worker" %}').catch(function () {});
        });
      }
    </script>
</body>
</html>
