{% extends 'vacinas/base.html' %}

{% block content %}
<header class="mb-5">
    <h2 class="fw-bold mb-0">Registrar Aplicação de Vacina</h2>
    <p class="text-muted">Selecione o paciente e os dados do lote aplicado.</p>
</header>

<div class="content-card">
    <form method="POST" class="row g-3">
        {% csrf_token %}
        
        {% for field in form %}
        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold text-secondary">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}
                <div class="form-text">{{ field.help_text }}</div>
            {% endif %}
        </div>
        {% endfor %}

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary shadow-sm">
                <i class="fas fa-check-circle me-2"></i>Finalizar Registro
            </button>
            <a href="{% url 'home' %}" class="btn btn-outline-secondary ms-2">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
