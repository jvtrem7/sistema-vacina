{% load static %}
<div id="portal-chat-root" class="portal-chat-root" aria-live="polite">
  <button type="button" id="portal-chat-toggle" class="portal-chat-fab" aria-expanded="false" aria-controls="portal-chat-panel" title="Dúvidas sobre vacinas">
    <i class="fas fa-syringe" aria-hidden="true"></i>
    <span class="visually-hidden">Abrir assistente sobre vacinas</span>
  </button>
  <div id="portal-chat-panel" class="portal-chat-panel" role="dialog" aria-labelledby="portal-chat-title" hidden>
    <div class="portal-chat-header">
      <div>
        <h2 id="portal-chat-title" class="portal-chat-title">Vacinas — tire dúvidas</h2>
        <p class="portal-chat-sub">Informação educativa. Não substitui avaliação de um profissional de saúde.</p>
      </div>
      <button type="button" id="portal-chat-close" class="portal-chat-icon-btn" aria-label="Fechar painel">
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
    </div>
    <div id="portal-chat-messages" class="portal-chat-messages"></div>
    <form id="portal-chat-form" class="portal-chat-form">
      {% csrf_token %}
      <label for="portal-chat-input" class="visually-hidden">Sua pergunta</label>
      <textarea id="portal-chat-input" class="portal-chat-input" rows="2" maxlength="2000" placeholder="Ex.: Por que a vacina do sarampo é importante?" autocomplete="off"></textarea>
      <button type="submit" class="portal-chat-send" id="portal-chat-send">
        <i class="fas fa-paper-plane" aria-hidden="true"></i>
        <span>Enviar</span>
      </button>
    </form>
  </div>
</div>
<style>
  .portal-chat-root { position: fixed; z-index: 999999; right: 1rem; bottom: 1rem; font-family: 'Inter', system-ui, sans-serif; isolation: isolate; }
  @media (max-width: 991px) {
    .portal-chat-root { bottom: 5.5rem; }
  }
  .portal-chat-fab {
    width: 3.5rem; height: 3.5rem; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #065f46 0%, #10b981 100%);
    color: #fff; font-size: 1.25rem; cursor: pointer;
    box-shadow: 0 10px 25px rgba(6, 95, 70, 0.35);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .portal-chat-fab:hover { transform: scale(1.05); box-shadow: 0 12px 28px rgba(6, 95, 70, 0.45); }
  .portal-chat-panel {
    position: absolute; right: 0; bottom: 4.25rem; width: min(100vw - 2rem, 22rem);
    max-height: min(70vh, 28rem); background: #fff; border-radius: 1rem;
    box-shadow: 0 20px 50px rgba(15, 23, 42, 0.18); border: 1px solid #e2e8f0;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .portal-chat-panel[hidden] { display: none !important; }
  .portal-chat-header {
    padding: 0.85rem 1rem; background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
    border-bottom: 1px solid #d1fae5; display: flex; gap: 0.5rem; align-items: flex-start;
  }
  .portal-chat-title { font-size: 0.95rem; font-weight: 700; margin: 0; color: #065f46; }
  .portal-chat-sub { font-size: 0.7rem; color: #64748b; margin: 0.25rem 0 0; line-height: 1.35; }
  .portal-chat-icon-btn {
    margin-left: auto; border: none; background: transparent; color: #64748b;
    padding: 0.35rem; cursor: pointer; border-radius: 0.35rem;
  }
  .portal-chat-icon-btn:hover { background: #fff; color: #0f172a; }
  .portal-chat-messages {
    flex: 1; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem;
    min-height: 10rem; max-height: 16rem; background: #f8fafc;
  }
  .portal-chat-bubble {
    max-width: 95%; padding: 0.55rem 0.7rem; border-radius: 0.65rem; font-size: 0.82rem; line-height: 1.45; white-space: pre-wrap;
  }
  .portal-chat-bubble.user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 0.2rem; }
  .portal-chat-bubble.assistant { align-self: flex-start; background: #fff; color: #1e293b; border: 1px solid #e2e8f0; border-bottom-left-radius: 0.2rem; }
  .portal-chat-bubble.system-note { align-self: center; background: #fef3c7; color: #92400e; font-size: 0.75rem; border: 1px solid #fde68a; }
  .portal-chat-form { padding: 0.65rem; border-top: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 0.45rem; background: #fff; }
  .portal-chat-input {
    width: 100%; resize: none; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 0.6rem;
    font-size: 0.82rem; font-family: inherit;
  }
  .portal-chat-input:focus { outline: 2px solid #10b981; outline-offset: 1px; border-color: #10b981; }
  .portal-chat-send {
    align-self: flex-end; display: inline-flex; align-items: center; gap: 0.35rem;
    background: #059669; color: #fff; border: none; border-radius: 0.45rem; padding: 0.45rem 0.85rem;
    font-size: 0.8rem; font-weight: 600; cursor: pointer;
  }
  .portal-chat-send:disabled { opacity: 0.55; cursor: not-allowed; }
  .portal-chat-typing { font-size: 0.75rem; color: #64748b; padding: 0 0.5rem 0.35rem; }
</style>
<script>
(function () {
  var root = document.getElementById('portal-chat-root');
  if (!root) return;
  var toggle = document.getElementById('portal-chat-toggle');
  var panel = document.getElementById('portal-chat-panel');
  var closeBtn = document.getElementById('portal-chat-close');
  var form = document.getElementById('portal-chat-form');
  var input = document.getElementById('portal-chat-input');
  var sendBtn = document.getElementById('portal-chat-send');
  var box = document.getElementById('portal-chat-messages');
  var chatUrl = '{% url "portal_chat" %}';

  function getCsrfToken() {
    var m = document.cookie.match(/csrftoken=([^;]+)/);
    if (m) return m[1];
    var inp = form.querySelector('[name=csrfmiddlewaretoken]');
    return inp ? inp.value : '';
  }

  function appendBubble(role, text) {
    var div = document.createElement('div');
    div.className = 'portal-chat-bubble ' + role;
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function openPanel() {
    panel.hidden = false;
    toggle.setAttribute('aria-expanded', 'true');
    if (!box.dataset.seeded) {
      appendBubble('system-note', 'Funciona sem custo: respostas automáticas por tema. Para diálogo com IA gratuita, use GROQ_API_KEY (console.groq.com). Pergunte sobre vacinas, calendário, mitos ou imunização coletiva.');
      box.dataset.seeded = '1';
    }
    input.focus();
  }

  function closePanel() {
    panel.hidden = true;
    toggle.setAttribute('aria-expanded', 'false');
  }

  toggle.addEventListener('click', function () {
    if (panel.hidden) openPanel(); else closePanel();
  });
  closeBtn.addEventListener('click', closePanel);

  var history = [];

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var text = (input.value || '').trim();
    if (!text) return;
    appendBubble('user', text);
    history.push({ role: 'user', content: text });
    input.value = '';
    sendBtn.disabled = true;

    var typing = document.createElement('div');
    typing.className = 'portal-chat-typing';
    typing.textContent = 'Pensando…';
    box.appendChild(typing);
    box.scrollTop = box.scrollHeight;

    var payload = { messages: history.slice(-16) };

    fetch(chatUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCsrfToken()
      },
      body: JSON.stringify(payload)
    })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (_ref) {
        var ok = _ref.ok, j = _ref.j;
        typing.remove();
        if (!ok || j.error) {
          appendBubble('assistant', j.message || 'Não foi possível obter resposta agora. Tente de novo em instantes.');
          history.pop();
          return;
        }
        var reply = j.reply || '';
        appendBubble('assistant', reply);
        history.push({ role: 'assistant', content: reply });
      })
      .catch(function () {
        typing.remove();
        appendBubble('assistant', 'Erro de conexão. Verifique a internet e tente novamente.');
        history.pop();
      })
      .finally(function () {
        sendBtn.disabled = false;
      });
  });
})();
</script>
