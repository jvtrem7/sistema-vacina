<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyVacc | Sistema de Gestão</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary-blue: #2563eb; --bg-light: #f4f7fe; --text-main: #334155; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); color: var(--text-main); margin: 0; }
        
        /* Sidebar Fixa */
        .sidebar { background: #fff; height: 100vh; border-right: 1px solid #e2e8f0; position: fixed; width: 260px; z-index: 100; }
        .main-content { margin-left: 260px; padding: 2.5rem; min-height: 100vh; }
        
        /* Estilo dos Links */
        .nav-link { color: #64748b; font-weight: 500; padding: 0.8rem 1.5rem; border-radius: 12px; margin: 0.2rem 1rem; transition: all 0.3s; }
        .nav-link.active { background-color: #eff6ff; color: var(--primary-blue); }
        .nav-link:hover { background-color: #f8fafc; color: var(--primary-blue); transform: translateX(5px); }
        
        /* Containers e Cards */
        .content-card { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .btn-primary { background-color: var(--primary-blue); border: none; padding: 10px 24px; border-radius: 10px; font-weight: 600; }
        
        /* Responsividade para celulares */
        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar h4, .sidebar span { display: none; }
            .main-content { margin-left: 70px; padding: 1rem; }
            .nav-link { padding: 0.8rem; text-align: center; }
            .nav-link i { margin: 0 !important; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="p-4 mb-3">
            <h4 class="text-primary fw-bold"><i class="fas fa-syringe me-2"></i><span>EasyVacc</span></h4>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">
                <i class="fas fa-chart-line me-2"></i> <span>Dashboard</span>
            </a>
            <a class="nav-link {% if request.resolver_match.url_name == 'cadastrar_paciente' %}active{% endif %}" href="{% url 'cadastrar_paciente' %}">
                <i class="fas fa-user-plus me-2"></i> <span>Novo Paciente</span>
            </a>
            <a class="nav-link {% if request.resolver_match.url_name == 'registrar_dose' %}active{% endif %}" href="{% url 'registrar_dose' %}">
                <i class="fas fa-pills me-2"></i> <span>Registrar Dose</span>
            </a>
            <div class="border-top my-3 mx-3"></div>
            <a class="nav-link" href="/admin">
                <i class="fas fa-cog me-2"></i> <span>Painel Admin</span>
            </a>
            <a class="nav-link {% if request.resolver_match.url_name == 'listar_pacientes' %}active{% endif %}" href="{% url 'listar_pacientes' %}">
    <i class="fas fa-address-book me-2"></i> <span>Lista de Pacientes</span>
</a>
        </nav>
    </div>

    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
