<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyVacc | Gestão de Imunização</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
<style>
    :root {
        --sidebar-width: 240px; /* Reduzi um pouco a largura */
        --primary-color: #2563eb;
    }

    html, body {
        overflow-x: hidden;
        background-color: #f8fafc;
        font-family: 'Inter', sans-serif;
    }

    /* SIDEBAR CORRIGIDA */
    .sidebar { 
        background: #ffffff; 
        height: 100vh; 
        position: fixed; 
        top: 0;
        left: 0;
        width: var(--sidebar-width); 
        z-index: 1000; 
        border-right: 1px solid #e2e8f0;
        display: flex;
        flex-direction: column;
        overflow-y: auto; /* PERMITE ROLAR A BARRA SE ELA FOR MAIOR QUE A TELA */
    }

    .logo-container { padding: 1.5rem 1rem; text-align: center; }
    .logo-img { width: 100%; max-width: 130px; height: auto; } /* Logo menor para caber tudo */

    .nav.flex-column {
        display: flex !important;
        flex-direction: column !important;
        padding-bottom: 20px;
    }

    .nav-link {
        padding: 0.7rem 1.2rem;
        color: #64748b;
        display: flex !important;
        align-items: center;
        text-decoration: none;
        font-weight: 500;
        font-size: 0.9rem;
    }

    /* ÍCONES ALINHADOS */
    .nav-link i {
        width: 28px; 
        font-size: 1.1rem;
        display: flex;
        justify-content: center;
        margin-right: 10px;
    }

    .nav-link:hover, .nav-link.active {
        background: #eff6ff;
        color: var(--primary-color);
        border-right: 4px solid var(--primary-color);
    }

    .menu-header {
        padding: 1.2rem 1.2rem 0.4rem;
        text-transform: uppercase;
        font-size: 0.65rem;
        font-weight: 700;
        color: #94a3b8;
        letter-spacing: 1px;
    }

    /* CONTEÚDO PRINCIPAL - POSICIONAMENTO REAL */
    .main-content { 
        margin-left: var(--sidebar-width); 
        padding: 2rem; 
        width: calc(100% - var(--sidebar-width));
        min-height: 100vh;
    }

    /* REMOVER BOTÃO INDESEJADO NO DASHBOARD (Se ele existir no content) */
    .main-content a[href*="cadastrar_paciente"].btn-primary {
        /* Se você quer que o botão suma apenas no dashboard, certifique-se de apagar no home.html */
    }

    /* RESPONSIVO CELULAR */
    @media (max-width: 991px) {
        .sidebar { width: 100%; height: auto; position: relative; overflow-y: visible; }
        .main-content { margin-left: 0; width: 100%; padding-bottom: 90px; }
        .nav.flex-column {
            flex-direction: row !important;
            position: fixed;
            bottom: 0;
            background: white;
            width: 100%;
            border-top: 1px solid #e2e8f0;
            justify-content: space-around;
            padding: 5px 0;
        }
        .nav-link { flex-direction: column; padding: 8px 5px !important; font-size: 0.6rem; }
        .nav-link i { margin: 0; width: auto; }
        .menu-header, .logo-container { display: none !important; }
    }
</style>
</head>
<body>
    {% load static %} 
    
    <div class="sidebar">
        <div class="logo-container">
            <img src="{% static 'vacinas/easyvacc.png' %}" alt="easyvacc" class="logo-img">
        </div>
        
        <nav class="nav flex-column">
            {% if user.is_authenticated %}
                <p class="menu-header">Administração</p>
                <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">
                    <i class="fas fa-chart-line"></i> <span>Dashboard</span>
                </a>
                <a class="nav-link {% if request.resolver_match.url_name == 'listar_pacientes' %}active{% endif %}" href="{% url 'listar_pacientes' %}">
                    <i class="fas fa-users"></i> <span>Pacientes</span>
                </a>
                <a class="nav-link {% if request.resolver_match.url_name == 'cadastrar_paciente' %}active{% endif %}" href="{% url 'cadastrar_paciente' %}">
                    <i class="fas fa-user-plus"></i> <span>Novo</span>
                </a>
                <a class="nav-link {% if request.resolver_match.url_name == 'registrar_dose' %}active{% endif %}" href="{% url 'registrar_dose' %}">
                    <i class="fas fa-pills"></i> <span>Dose</span>
                </a>
                <a class="nav-link {% if request.resolver_match.url_name == 'listar_estoque' %}active{% endif %}" href="{% url 'listar_estoque' %}">
                    <i class="fas fa-boxes"></i> <span>Estoque</span>
                </a>

                <p class="menu-header">Sistema</p>
                <a class="nav-link" href="/admin">
                    <i class="fas fa-cog"></i> <span>Admin</span>
                </a>
                
                <form id="logout-form" action="{% url 'logout' %}" method="post" style="display: none;">
                    {% csrf_token %}
                </form>
                <a class="nav-link text-danger" href="#" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
                    <i class="fas fa-sign-out-alt"></i> <span>Sair</span>
                </a>
            {% else %}
                <p class="menu-header">Portal</p>
                <a class="nav-link" href="{% url 'caderneta_paciente' %}">
                    <i class="fas fa-id-card"></i> <span>Caderneta</span>
                </a>
                <a class="nav-link" href="{% url 'busca_postos' %}">
                    <i class="fas fa-map-marker-alt"></i> <span>Postos</span>
                </a>
            {% endif %}
        </nav>
    </div>

    <div class="main-content">
        <div class="container-fluid">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
