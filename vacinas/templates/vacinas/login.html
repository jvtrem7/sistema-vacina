{% extends 'vacinas/base_externo.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-4">
        <div class="content-card shadow-lg">
            <div class="text-center mb-4">
                <i class="fas fa-user-shield fa-3x text-primary mb-3"></i>
                <h3 class="fw-bold">Login do Servidor</h3>
                <p class="text-muted small">Identifique-se para acessar o painel</p>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Usuário</label>
                    <input type="text" name="username" class="form-control" placeholder="Seu usuário...">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Senha</label>
                    <input type="password" name="password" class="form-control" placeholder="********">
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm">
                    Entrar no Sistema
                </button>
            </form>
            
            <div class="mt-4 text-center">
                <a href="{% url 'index_escolha' %}" class="text-decoration-none small text-muted">
                    <i class="fas fa-arrow-left me-1"></i> Voltar para seleção
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
