{% extends 'vacinas/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="content-card shadow-lg">
            <div class="d-flex align-items-center mb-4">
                <a href="{% url 'listar_estoque' %}" class="btn btn-light rounded-circle me-3">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <h3 class="fw-bold mb-0">Registrar Entrada de Lote</h3>
            </div>
            
            <form method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Imunizante (Vacina)</label>
                        {{ form.nome_vacina }}
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Número do Lote</label>
                        {{ form.lote }}
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Quantidade de Doses</label>
                        {{ form.quantidade_atual }}
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Data de Validade</label>
                        {{ form.data_validade }}
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Fornecedor</label>
                        {{ form.fornecedor }}
                    </div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow">
                        Confirmar Entrada no Estoque
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
